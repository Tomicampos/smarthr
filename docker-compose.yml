version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smarthr_db
      MYSQL_USER: smarthr_user
      MYSQL_PASSWORD: smarthr_password
    ports:
      - "3307:3306" 
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_USER=smarthr_user
      - DB_PASSWORD=smarthr_password
      - DB_NAME=smarthr_db
      - JWT_SECRET=clave_secreta_super_segura
      - FRONTEND_URL=http://localhost
      # se toman las var de google del .env
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - REFRESH_TOKEN=${REFRESH_TOKEN}

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

volumes:
  db_data: